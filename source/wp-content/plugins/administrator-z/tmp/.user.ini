;===========================================================
; File: .user.ini
; Mục đích: Ghi đè các thiết lập PHP riêng theo thư mục/domain cho PHP-FPM
; Vị trí: /home/admin/domains/<tên-domain>/public_html/.user.ini
; Lưu ý: Phải có dấu chấm đầu (.) — PHP sẽ không đọc nếu không có
;===========================================================

; Giới hạn kích thước file upload tối đa
upload_max_filesize = 1024M
; Ghi chú:
; - Ghi đè giá trị php.ini chỉ cho thư mục này
; - WordPress upload sẽ theo giá trị này

; Giới hạn kích thước POST tối đa
post_max_size = 1024M
; Ghi chú:
; - Phải >= upload_max_filesize
; - PHP-FPM sẽ đọc giá trị này, trừ khi pool config có php_admin_value[post_max_size] → sẽ chặn override

; Giới hạn bộ nhớ tối đa PHP sử dụng cho mỗi script
memory_limit = 1024M
; Ghi chú:
; - Có thể thiết lập riêng cho từng thư mục với user.ini
; - Nếu pool config có php_admin_value[memory_limit], giá trị này sẽ bị bỏ qua

;===========================================================
; Ghi chú thêm về cơ chế hoạt động .user.ini với PHP-FPM
;===========================================================

; 1) Kiểm tra xem PHP đang chạy PHP-FPM hay không:
;    - Tạo file phpinfo.php trong thư mục web:
;         <?php phpinfo(); ?>
;    - Truy cập và tìm "Server API":
;         - FPM/FastCGI → PHP-FPM (đúng)
;         - Apache 2.0 Handler → không phải FPM, .user.ini sẽ không hoạt động

; 2) PHP-FPM tự động đọc .user.ini nếu trong php.ini có dòng:
;       user_ini.filename = ".user.ini"
;    - Đây là file ẩn, phải có dấu chấm đầu
;    - Dùng để override upload_max_filesize, post_max_size, memory_limit cho từng thư mục/domain

; 3) Thay đổi trong .user.ini không có tác dụng ngay lập tức:
;    - PHP cache .user.ini theo user_ini.cache_ttl (mặc định 300 giây)
;    - Nếu muốn test ngay, chỉnh giá trị này trong php.ini:
;         user_ini.cache_ttl = 1

; 4) Ứng dụng WordPress:
;    - Dùng .user.ini để tăng upload_max_filesize / post_max_size / memory_limit
;    - Không cần plugin hay SSH, chỉ cần tạo file .user.ini trong thư mục gốc website

; 5) Lưu ý giới hạn:
;    - Nếu pool config PHP-FPM có php_admin_value[...] → giá trị tương ứng trong .user.ini sẽ **bị bỏ qua**
;    - Ví dụ: php_admin_value[post_max_size] = 64M sẽ chặn .user.ini override
;===========================================================

