# /docker-compose.override.yml
services:
  app:
    build: .
    user: "${HOST_USER:-33:33}"
    volumes:
      - ./source:/var/www/html
      - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro
      - ./docker/php/zzz-uploads.ini:/usr/local/etc/php/conf.d/zzz-uploads.ini:ro
    networks:
      default:


  web:
    volumes:
      - ./source:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      default:
      proxy:


  db:
    networks:
      default:
      

networks:
  proxy:
    external: true